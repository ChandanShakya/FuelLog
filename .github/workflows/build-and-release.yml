name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build with Gradle
        run: ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace

      - name: Run Android lint
        run: ./gradlew lintDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app/build/outputs/

  publish-release:
    name: Publish Release
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build release bundle
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep versionName app/build.gradle.kts | grep -o '"[0-9.]*"' | tr -d '"' | head -1)
          VERSION_CODE=$(grep versionCode app/build.gradle.kts | grep -o '[0-9]\+' | head -1)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Release v$VERSION_NAME ($VERSION_CODE)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION_NAME }}
          name: FuelLog v${{ steps.version.outputs.VERSION_NAME }}
          body: |
            ## FuelLog Android Fuel Tracker v${{ steps.version.outputs.VERSION_NAME }}

            ### Changes
            - See commit history for details

            ### Downloads
            - APK and AAB files attached below
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
